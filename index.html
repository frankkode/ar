<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Living Print — AR (Inside the Heart)</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  #hdr{position:fixed;top:0;left:0;right:0;z-index:6;padding:10px 14px;color:#fff;
    background:linear-gradient(180deg,rgba(8,12,24,.85),rgba(8,12,24,0));pointer-events:none}
  #hdr h1{margin:0;font-size:15px;font-weight:800}
  #hdr p{margin:3px 0 0;font-size:12px;color:#cfe0ff}
  #hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:6;
    background:rgba(8,12,24,.82);color:#eef;padding:9px 16px;border-radius:20px;font-size:13px;
    border:1px solid rgba(120,150,210,.3)}
  #speakBtn{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:7;
    background:#ff3b5c;color:#fff;border:none;padding:14px 26px;border-radius:28px;
    font-size:15px;font-weight:700;cursor:pointer;display:none;
    box-shadow:0 4px 18px rgba(255,59,92,.45)}
  #speakBtn:active{background:#e0304f}
</style>
</head>
<body>
<div id="hdr">
  <h1>Living Print — Augmented Reality</h1>
  <p>Point your camera at <b>Figure 4.2</b> (the printed heart figure)</p>
</div>
<div id="hint">Scanning… hold the figure steady</div>
<button id="speakBtn">Tap to Hear the Heart</button>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes; filterMinCF: 0.0001; filterBeta: 0.001"
  color-space="sRGB" renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true"
  vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="heartModel" src="./heart.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse"
            raycaster="objects: .tappable"></a-camera>

  <!-- Content anchored to the figure (target 0) -->
  <a-entity mindar-image-target="targetIndex: 0">

    <a-entity light="type: ambient; intensity: 0.9"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="0.5 1 1"></a-entity>

    <a-entity gltf-model="#heartModel" position="0 0 0.18" rotation="0 0 0" scale="2.1 2.1 2.1"
              class="tappable" id="arHeartModel"
              animation-mixer="clip: *; loop: repeat"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 14000; easing: linear"></a-entity>

    <a-box class="tappable" position="0 0.1 0.18" width="2.0" height="2.0" depth="1.2"
           material="visible: false; transparent: true; opacity: 0"></a-box>

    <a-entity position="0 1.8 0.2">
      <a-plane width="1.5" height="0.22" color="#0b1124" opacity="0.85" material="shader: flat"></a-plane>
      <a-text value="The Human Heart — tap to hear" align="center" width="2.4" color="#ffffff" position="0 0 0.01"></a-text>
    </a-entity>
  </a-entity>
</a-scene>

<script>
  var audioReady = false;
  var heartbeatAudio = null;
  var heartbeatBufUrl = null;
  var line = "This is the human heart. The right side pumps deoxygenated blood to the lungs, and the left side pumps oxygenated blood to the body.";

  // ── Render heartbeat WAV using OfflineAudioContext ──
  function renderHeartbeatWav(callback){
    var sampleRate = 44100;
    var cycleLen = sampleRate; // 1 second of heartbeat
    var ctx = new OfflineAudioContext(1, cycleLen, sampleRate);

    function thump(startTime, freq, duration, volume){
      // sub oscillator
      var sub = ctx.createOscillator();
      var subG = ctx.createGain();
      sub.type = 'triangle';
      sub.frequency.setValueAtTime(freq, startTime);
      sub.frequency.exponentialRampToValueAtTime(freq * 0.3, startTime + duration);
      subG.gain.setValueAtTime(0, startTime);
      subG.gain.exponentialRampToValueAtTime(volume * 0.8, startTime + 0.01);
      subG.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
      sub.connect(subG);
      subG.connect(ctx.destination);

      // noise texture
      var bufSize = Math.floor(sampleRate * duration);
      var nb = ctx.createBuffer(1, bufSize, sampleRate);
      var d = nb.getChannelData(0);
      for(var i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
      var noise = ctx.createBufferSource();
      noise.buffer = nb;
      var nf = ctx.createBiquadFilter();
      nf.type = 'bandpass';
      nf.frequency.value = 180;
      nf.Q.value = 3;
      var ng = ctx.createGain();
      ng.gain.setValueAtTime(0, startTime);
      ng.gain.exponentialRampToValueAtTime(volume * 0.18, startTime + 0.01);
      ng.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.5);
      noise.connect(nf);
      nf.connect(ng);
      ng.connect(ctx.destination);

      sub.start(startTime);
      sub.stop(startTime + duration);
      noise.start(startTime);
      noise.stop(startTime + duration);
    }

    // lub-dub cycle repeated twice in 1 second (resting ~120bpm felt realism)
    thump(0.05, 58, 0.22, 1.8);   // lub
    thump(0.28, 75, 0.15, 1.4);  // dub
    thump(0.55, 58, 0.22, 1.8);  // lub
    thump(0.78, 75, 0.15, 1.4);  // dub

    ctx.startRendering().then(function(buffer){
      // convert AudioBuffer to WAV
      var wav = audioBufferToWav(buffer);
      var blob = new Blob([wav], {type: 'audio/wav'});
      callback(URL.createObjectURL(blob));
    });
  }

  function audioBufferToWav(buffer){
    var numChannels = buffer.numberOfChannels;
    var sampleRate = buffer.sampleRate;
    var length = buffer.length;
    var bytesPerSample = 2;
    var blockAlign = numChannels * bytesPerSample;
    var dataSize = length * blockAlign;
    var headerSize = 44;
    var arrayBuffer = new ArrayBuffer(headerSize + dataSize);
    var view = new DataView(arrayBuffer);

    function writeString(offset, str){
      for(var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
    }
    writeString(0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * blockAlign, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bytesPerSample * 8, true);
    writeString(36, 'data');
    view.setUint32(40, dataSize, true);

    var channel = buffer.getChannelData(0);
    var offset = 44;
    for(var i = 0; i < length; i++){
      var sample = Math.max(-1, Math.min(1, channel[i]));
      var intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
      view.setInt16(offset, intSample, true);
      offset += 2;
    }
    return arrayBuffer;
  }

  // ── Speech ──
  function speak(t){
    try{
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 0.98;
      var v = (window.speechSynthesis.getVoices()||[]).filter(function(x){return /^en/i.test(x.lang);});
      if(v.length) u.voice = v[0];
      window.speechSynthesis.resume(); window.speechSynthesis.speak(u);
    }catch(e){console.log('speech error',e)}
  }

  function unlockAudio(){
    if(audioReady) return;
    audioReady = true;
    speak(line);
    document.querySelector('#speakBtn').style.display = 'none';

    // pre-render heartbeat if not done yet
    if(heartbeatAudio){
      heartbeatAudio.play();
    } else {
      renderHeartbeatWav(function(url){
        heartbeatBufUrl = url;
        heartbeatAudio = new Audio(url);
        heartbeatAudio.loop = true;
        heartbeatAudio.volume = 1.0;
        heartbeatAudio.play().catch(function(e){ console.log('audio play error', e); });
      });
    }
  }

  document.querySelector('#speakBtn').addEventListener('click', unlockAudio);

  window.addEventListener('load',function(){
    if(window.speechSynthesis) try{window.speechSynthesis.getVoices();}catch(e){}

    var m = document.querySelector('#arHeartModel');
    if(m) m.addEventListener('click',function(){
      if(!audioReady){ unlockAudio(); }
      else { speak(line); }
    });

    var sc = document.querySelector('a-scene');
    var heartEl = document.querySelector('#arHeartModel');
    var baseScale = '2.1 2.1 2.1';

    sc.addEventListener('targetFound',function(){
      document.querySelector('#hint').textContent = 'Found! Tap the button to hear it';
      document.querySelector('#speakBtn').style.display = 'block';
      // resume heartbeat if already unlocked
      if(audioReady && heartbeatAudio){
        heartbeatAudio.play();
      }
      // visual pulse sync
      if(heartEl && audioReady){
        var pulse = setInterval(function(){
          heartEl.setAttribute('scale', '2.4 2.4 2.4');
          setTimeout(function(){ if(heartEl) heartEl.setAttribute('scale', baseScale); }, 120);
        }, 500);
        sc._pulseInterval = pulse;
      }
    });

    sc.addEventListener('targetLost',function(){
      document.querySelector('#hint').textContent = 'Scanning… hold the figure steady';
      document.querySelector('#speakBtn').style.display = 'none';
      if(heartbeatAudio){ heartbeatAudio.pause(); }
      if(sc._pulseInterval){ clearInterval(sc._pulseInterval); sc._pulseInterval = null; }
    });
  });
</script>
</body>
</html>
